BACKBONE2D:
  YOLOv8:
    ver : m

    PRETRAIN:
      n : ./weights/backbone2D/v8_n.pth
      s : ./weights/backbone2D/v8_s.pth
      m : ./weights/backbone2D/v8_m.pth
      l : ./weights/backbone2D/v8_l.pth
      x : ./weights/backbone2D/v8_x.pth

    STPE:
      enabled: True
      embed_dim: 128
      k_coarse: 8
      k_fine: 24
      num_heads: 4
      dropout: 0.0


      temp_shift_enabled: True
      temp_shift_fold_div: 32
      temp_shift_p3_enabled: false
      temp_shift_p4_enabled: false
      temp_shift_p5_enabled: true
      n_segment: 16
      padapter_enabled: false

    NECK:
      carafepp_enabled: True

BACKBONE3D:

  MOBILENET:
    width_mult: 2.0

    PRETRAIN:
      width_mult_0.5x  : weights/backbone3D/mobilenet/kinetics_mobilenet_0.5x_RGB_16_best.pth
      width_mult_1.0x  : weights/backbone3D/mobilenet/kinetics_mobilenet_1.0x_RGB_16_best.pth
      width_mult_1.5x  : weights/backbone3D/mobilenet/kinetics_mobilenet_1.5x_RGB_16_best.pth
      width_mult_2.0x  : ./weights/backbone3D/mobilenet/kinetics_mobilenet_2.0x_RGB_16_best.pth

  MOBILENETv2:
    width_mult: 1.0

    PRETRAIN:
      width_mult_0.2x  : weights/backbone3D/mobilenetv2/kinetics_mobilenetv2_0.2x_RGB_16_best.pth
      width_mult_0.45x : weights/backbone3D/mobilenetv2/kinetics_mobilenetv2_0.45x_RGB_16_best.pth
      width_mult_0.7x  : weights/backbone3D/mobilenetv2/kinetics_mobilenetv2_0.7x_RGB_16_best.pth
      width_mult_1.0x  : ./weights/backbone3D/mobilenetv2/kinetics_mobilenetv2_1.0x_RGB_16_best.pth

  SHUFFLENET:
    width_mult: 2.0

    PRETRAIN:
      width_mult_0.5x  : weights/backbone3D/shufflenet/kinetics_shufflenet_0.5x_G3_RGB_16_best.pth
      width_mult_1.0x  : weights/backbone3D/shufflenet/kinetics_shufflenet_1.0x_G3_RGB_16_best.pth
      width_mult_1.5x  : weights/backbone3D/shufflenet/kinetics_shufflenet_1.5x_G3_RGB_16_best.pth
      width_mult_2.0x  : ./weights/backbone3D/shufflenet/kinetics_shufflenet_2.0x_G3_RGB_16_best.pth

  SHUFFLENETv2:
    width_mult: 2.0

    PRETRAIN:
      width_mult_0.25x : weights/backbone3D/shufflenetv2/kinetics_shufflenetv2_0.25x_RGB_16_best.pth
      width_mult_1.0x  : weights/backbone3D/shufflenetv2/kinetics_shufflenetv2_1.0x_RGB_16_best.pth
      width_mult_1.5x  : weights/backbone3D/shufflenetv2/kinetics_shufflenetv2_1.5x_RGB_16_best.pth
      width_mult_2.0x  : ./weights/backbone3D/shufflenetv2/kinetics_shufflenetv2_2.0x_RGB_16_best.pth

  I3D:
    PRETRAIN:
      default: weights/backbone3D/I3D/rgb_imagenet.pth
    LTCC:
      enabled: True
      multi_granularity_temporal_context: True
      state_change_enhancement: True
      temporal_attention_compression: True

  RESNET:
    ver : 101

    PRETRAIN:
      ver_18 : weights/backbone3D/resnet/kinetics_resnet_18_RGB_16_best.pth
      ver_50 : weights/backbone3D/resnet/kinetics_resnet_50_RGB_16_best.pth
      ver_101: ./weights/backbone3D/resnet/kinetics_resnet_101_RGB_16_best.pth

  RESNEXT:
    ver : 101

    PRETRAIN:
      ver_101 : weights/backbone3D/resnext/resnext-101-kinetics.pth

LOSS:
  TAL:
    top_k  : 10
    alpha  : 0.5
    beta   : 6.0
    radius : 2.5
    soft_label : False

    scale_cls_loss : 0.5
    scale_box_loss : 7.5
    scale_dfl_loss : 1.5

  SIMOTA:
    top_k  : 10
    gamma  : 0.5
    radius : 2.5
    mode   : unbalance
    soft_label : True

    dynamic_k     : False
    dynamic_top_k : 10

    scale_cls_loss : 0.5
    scale_box_loss : 5.0
    scale_dfl_loss : 0.5

FUSION:
  DOCF:
    enabled: true
    num_layers: 2
    interchannels: 256
    upsample: carafe
    gating: true
    dynamic_alpha_enabled: true
    dynamic_alpha_hidden: 64
    dynamic_alpha_range: [0.5, 1.5]
    orthogonal_enabled: true
    orthogonal_eps: 0.0001
    orthogonal_gamma_init_box: 0.35
    orthogonal_gamma_init_cls: 0.65
    alpha_init:
      box: [0.0, 0.12, 0.12]
      cls: [0.0, 1.25, 1.25]
POSTPROC:
  SEQ_NMS:
    enabled: false
    window: 5
    iou_thr: 0.35
    decay: 0.8
    center_dist_thr: 0.4
    k_support: 2
    lambda_boost: 0.30
    cap: 0.15


config_path       : config/cf/ava.yaml
dataset           : ava
loss              : simota
active_checker    : True
num_classes       : 8
backbone2D        : yolov8
backbone3D        : i3d
fusion_module     : DOCF
mode              : decoupled
interchannels     : [256, 256, 256]
pretrain_path     : ./result/ema_epoch_4.pth
data_root         : ./data/ava_v2.2
img_size          : 224
clip_length       : 16
batch_size        : 32
num_workers       : 8
acc_grad          : 2
lr                : 0.0001
weight_decay      : 0.0005
max_step_warmup   : 500
adjustlr_schedule : [3, 4, 5, 6]
max_epoch         : 9
lr_decay          : 0.5
save_folder       : ./result
sampling_rate     : 1
labelmap          : ./data/ava_v2.2/annotations/ava_v2.2/ava_action_list_v2.2.pbtxt
groundtruth       : ./data/ava_v2.2/annotations/ava_v2.2/ava_val_v2.2.csv
detections        : ./ava_result/ava_predicted_file.csv



